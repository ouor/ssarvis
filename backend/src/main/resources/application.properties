spring.application.name=backend

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}

app.openai.chat-history-turns=${OPENAI_CHAT_HISTORY_TURNS:30}
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:jwt_secret_key}
app.auth.jwt.access-token-expiration-minutes=${APP_AUTH_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:3600}
app.bootstrap.default-account.enabled=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_ENABLED:false}
app.bootstrap.default-account.username=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_USERNAME:}
app.bootstrap.default-account.password=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_PASSWORD:}
app.bootstrap.default-account.display-name=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_DISPLAY_NAME:기본 계정}
app.bootstrap.default-account.voice-sample-paths=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_VOICE_SAMPLE_PATHS:}
app.bootstrap.default-account.voice-aliases=${APP_BOOTSTRAP_DEFAULT_ACCOUNT_VOICE_ALIASES:}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.dashscope.api-key=${DASHSCOPE_API_KEY:}
app.dashscope.base-url=${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/api/v1}
app.dashscope.realtime-url=${DASHSCOPE_REALTIME_URL:wss://dashscope.aliyuncs.com/api-ws/v1/realtime}
app.dashscope.tts-model=${DASHSCOPE_TTS_MODEL:qwen3-tts-vc-realtime-2026-01-15}

app.media.ffmpeg-path=${FFMPEG_PATH:ffmpeg}

app.storage.s3.enabled=${S3_ENABLED:false}
app.storage.s3.bucket=${S3_BUCKET:ssarviss3}
app.storage.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.s3.key-prefix=${S3_KEY_PREFIX:ssarvis/tts}

app.storage.s3.region=${S3_REGION:auto}
app.storage.s3.path-style-access=${S3_PATH_STYLE_ACCESS:false}
app.storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ssarvisdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
