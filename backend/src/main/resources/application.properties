spring.application.name=backend

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-5}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.openai.chat-history-turns=${OPENAI_CHAT_HISTORY_TURNS:10}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.dashscope.api-key=${DASHSCOPE_API_KEY:}
app.dashscope.base-url=${DASHSCOPE_BASE_URL:https://dashscope-intl.aliyuncs.com/api/v1}
app.dashscope.tts-model=${DASHSCOPE_TTS_MODEL:qwen3-tts-vc-2026-01-22}
app.media.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
app.storage.s3.enabled=${S3_ENABLED:false}
app.storage.s3.bucket=${S3_BUCKET:}
app.storage.s3.region=${S3_REGION:ap-northeast-2}
app.storage.s3.endpoint=${S3_ENDPOINT:}
app.storage.s3.access-key=${S3_ACCESS_KEY:}
app.storage.s3.secret-key=${S3_SECRET_KEY:}
app.storage.s3.key-prefix=${S3_KEY_PREFIX:ssarvis/tts}
app.storage.s3.path-style-access=${S3_PATH_STYLE_ACCESS:false}
app.storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ssarvisdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
