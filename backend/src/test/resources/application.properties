spring.datasource.url=jdbc:h2:mem:ssarvisdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul

app.openai.api-key=test-key
app.auth.jwt.secret=test-jwt-secret-key-that-is-at-least-32-bytes-long
app.auth.jwt.access-token-expiration-minutes=120
